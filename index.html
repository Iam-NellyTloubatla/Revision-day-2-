<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Score Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    button.danger {
      background: #f44336;
    }

    button.danger:hover {
      background: #da190b;
    }

    .results-section {
      background: #f5f5f5;
      padding: 25px;
      border-radius: 10px;
      margin-top: 30px;
    }

    h2 {
      color: #333;
      margin-top: 0;
      margin-bottom: 15px;
    }

    .score-list {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      max-height: 150px;
      overflow-y: auto;
    }

    .score-item {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 16px;
    }

    .score-item:last-child {
      border-bottom: none;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .stat-box {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      border-left: 4px solid #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .grade-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      grid-column: 1 / -1;
      border-left: 4px solid #FFD700;
    }

    .grade {
      font-size: 48px;
      font-weight: bold;
      color: #667eea;
      margin: 10px 0;
    }

    .stars {
      font-size: 30px;
      margin: 10px 0;
    }

    .empty-message {
      text-align: center;
      color: #999;
      padding: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Test Score Calculator</h1>

    <div class="input-section">
      <input 
        type="number" 
        id="scoreInput" 
        placeholder="Enter test score (0-100)" 
        min="0" 
        max="100"
      >
      <button id="addBtn">Add Score</button>
      <button id="clearBtn" class="danger">Clear All</button>
    </div>

    <div class="results-section">
      <h2>📈 Your Results:</h2>
      <div id="scoreList" class="score-list">
        <div class="empty-message">No scores yet. Add your first score! 👆</div>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Number of Tests</div>
          <div class="stat-value" id="testCount">0</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Average Score</div>
          <div class="stat-value" id="average">--</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Best Score</div>
          <div class="stat-value" id="bestScore">--</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Lowest Score</div>
          <div class="stat-value" id="lowestScore">--</div>
        </div>

        <div class="grade-box">
          <div class="stat-label">Your Grade</div>
          <div class="grade" id="gradeDisplay">--</div>
          <div class="stars" id="starDisplay"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Array to store all scores
    let scores = [];

    //HTML elements 
    const scoreInput = document.getElementById("scoreInput");
    const addBtn = document.getElementById("addBtn");
    const clearBtn = document.getElementById("clearBtn");
    const scoreList = document.getElementById("scoreList");
    const testCount = document.getElementById("testCount");
    const averageDisplay = document.getElementById("average");
    const bestScoreDisplay = document.getElementById("bestScore");
    const lowestScoreDisplay = document.getElementById("lowestScore");
    const gradeDisplay = document.getElementById("gradeDisplay");
    const starDisplay = document.getElementById("starDisplay");

    // ============================================
    // TODO 1: Write the addScore() function
    // ============================================
    // This function should:
    // 1. Get the value from scoreInput
    // 2. Check if it's a valid number (0-100)
    //    - If empty: show alert "Please enter a score"
    //    - If < 0 or > 100: show alert "Score must be between 0-100"
    //    - If valid: add it to the scores array
    // 3. Clear the input field (set value to "")
    // 4. Call updateResults() function
    
    function addScore() {
      const value = scoreInput.value.trim();

      if (value === "") {
        alert("Please enter a score");
        return;
      }

      const score = parseFloat(value);
      if (Number.isNaN(score) || score < 0 || score > 100) {
        alert("Score must be between 0-100");
        return;
      }

      scores.push(score);
      scoreInput.value = "";
      updateResults();
    }

    function clearAllScores() {
      scores = [];
      scoreInput.value = "";
      updateResults();
    }
    // ============================================
    // TODO 3: Write the updateResults() function
    // ============================================
    // This is the MAIN function that does most of the work
    // It should:
    //
    // PART A: Update the Score List
    // - Clear the scoreList div
    // - If scores array is empty: show "No scores yet..."
    // - If scores has values: 
    //   * LOOP through scores array (use for loop)
    //   * For each score at index i, create HTML:
    //     <div class="score-item">[index+1]. [score]</div>
    //   * Add it to scoreList
    //
    // PART B: Update the Statistics
    // - Update testCount to: scores.length
    // - If scores is empty: set average, bestScore, lowestScore to "--"
    // - If scores has values:
    //   * Calculate AVERAGE:
    //     - Create a variable: let sum = 0
    //     - LOOP through scores and ADD each one to sum
    //     - average = sum / scores.length
    //   * Find BEST SCORE:
    //     - Create a variable: let maxScore = scores[0]
    //     - LOOP through scores
    //     - If current score > maxScore, update maxScore
    //   * Find LOWEST SCORE:
    //     - Create a variable: let minScore = scores[0]
    //     - LOOP through scores
    //     - If current score < minScore, update minScore
    //   * Update the HTML with these values
    //
    // PART C: Determine Grade
    // - Round average to nearest whole number
    // - Use if/else operators to assign grade:
    //   * average >= 90: Grade A ⭐⭐⭐⭐⭐ (5 stars)
    //   * average >= 80: Grade B ⭐⭐⭐⭐ (4 stars)
    //   * average >= 70: Grade C ⭐⭐⭐ (3 stars)
    //   * average >= 60: Grade D ⭐⭐ (2 stars)
    //   * average < 60: Grade F ⭐ (1 star)
    // - Update gradeDisplay with the letter grade
    // - Update starDisplay with the stars
    
    function updateResults() {
      scoreList.innerHTML = "";

      if (scores.length === 0) {
        const emptyMessage = document.createElement("div");
        emptyMessage.className = "empty-message";
        emptyMessage.textContent = "No scores yet. Add your first score! 👆";
        scoreList.appendChild(emptyMessage);

        testCount.textContent = "0";
        averageDisplay.textContent = "--";
        bestScoreDisplay.textContent = "--";
        lowestScoreDisplay.textContent = "--";
        gradeDisplay.textContent = "--";
        starDisplay.textContent = "";
        return;
      }

      for (let i = 0; i < scores.length; i++) {
        const scoreItem = document.createElement("div");
        scoreItem.className = "score-item";
        scoreItem.textContent = `${i + 1}. ${scores[i]}`;
        scoreList.appendChild(scoreItem);
      }

      testCount.textContent = scores.length.toString();

      let sum = 0;
      let maxScore = scores[0];
      let minScore = scores[0];

      for (let i = 0; i < scores.length; i++) {
        const current = scores[i];
        sum += current;
        if (current > maxScore) {
          maxScore = current;
        }
        if (current < minScore) {
          minScore = current;
        }
      }

      const average = sum / scores.length;
      averageDisplay.textContent = average.toFixed(1);
      bestScoreDisplay.textContent = maxScore.toString();
      lowestScoreDisplay.textContent = minScore.toString();

      const roundedAverage = Math.round(average);
      let grade = "F";
      let stars = "⭐";

      if (roundedAverage >= 90) {
        grade = "A";
        stars = "⭐⭐⭐⭐⭐";
      } else if (roundedAverage >= 80) {
        grade = "B";
        stars = "⭐⭐⭐⭐";
      } else if (roundedAverage >= 70) {
        grade = "C";
        stars = "⭐⭐⭐";
      } else if (roundedAverage >= 60) {
        grade = "D";
        stars = "⭐⭐";
      }

      gradeDisplay.textContent = grade;
      starDisplay.textContent = stars;
    }

    // Add event listeners
    addBtn.addEventListener("click", addScore);
    clearBtn.addEventListener("click", clearAllScores);

    // Allow pressing Enter to add score
    scoreInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        addScore();
      }
    });

    // Initial update
    updateResults();
  </script>
</body>
</html>
